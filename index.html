<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Building Conversational AI using LLM and Agents</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700;900&family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: radial-gradient(ellipse at 30% 20%, #1a1333 0%, #0d0a1a 40%, #080610 100%);
            font-family: 'Cormorant Garamond', Georgia, serif;
            color: #e8dcc8;
            overflow: hidden;
        }

        /* Parchment-like vignette overlay */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background: radial-gradient(ellipse at center, transparent 40%, rgba(8,6,16,0.6) 100%);
            pointer-events: none;
            z-index: 1;
        }

        .cover-container {
            max-width: 780px;
            width: 92%;
            text-align: center;
            padding: 2rem;
            position: relative;
            z-index: 2;
        }

        /* Book cover image */
        .cover-image-wrapper {
            position: relative;
            margin-bottom: 1.5rem;
        }

        .cover-image {
            width: 100%;
            max-width: 320px;
            border-radius: 6px;
            border: 2px solid rgba(180, 140, 60, 0.3);
            box-shadow:
                0 0 80px rgba(200, 160, 60, 0.12),
                0 25px 60px rgba(0, 0, 0, 0.6),
                inset 0 0 40px rgba(200, 160, 60, 0.05);
        }

        .glow-ring {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 115%;
            height: 115%;
            border-radius: 12px;
            background: radial-gradient(ellipse, rgba(200, 160, 60, 0.06) 0%, transparent 65%);
            pointer-events: none;
            animation: glowPulse 5s ease-in-out infinite;
        }

        @keyframes glowPulse {
            0%, 100% { opacity: 0.4; }
            50% { opacity: 1; }
        }

        /* Title: old book lettering */
        .title {
            font-family: 'Cinzel', Georgia, serif;
            font-weight: 700;
            font-size: clamp(1.8rem, 4.5vw, 2.8rem);
            line-height: 1.25;
            margin-bottom: 0.6rem;
            color: #d4b96a;
            text-shadow: 0 0 30px rgba(200, 160, 60, 0.25), 0 2px 4px rgba(0,0,0,0.4);
            letter-spacing: 0.03em;
        }

        /* Highlighted keywords in title with gentle glow animation */
        .title .hl {
            background: linear-gradient(135deg, #f0c040 0%, #e8a020 50%, #f0c040 100%);
            background-size: 200% 100%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            filter: brightness(1.2);
            position: relative;
            animation: hlShimmer 4s ease-in-out infinite;
            cursor: default;
        }
        .title .hl:nth-child(2) { animation-delay: 1.3s; }
        .title .hl:nth-child(3) { animation-delay: 2.6s; }
        @keyframes hlShimmer {
            0%, 100% { background-position: 0% center; filter: brightness(1.2); }
            50% { background-position: 100% center; filter: brightness(1.5); }
        }
        .title .hl::after {
            content: '';
            position: absolute;
            bottom: -2px;
            left: 0;
            right: 0;
            height: 2px;
            background: linear-gradient(90deg, transparent, rgba(240, 192, 64, 0.5), transparent);
            animation: hlLine 4s ease-in-out infinite;
        }
        @keyframes hlLine {
            0%, 100% { opacity: 0.5; }
            50% { opacity: 1; }
        }
        .title .hl:hover {
            filter: brightness(1.8) !important;
            text-shadow: 0 0 20px rgba(240, 192, 64, 0.6);
        }

        /* Subtitle */
        .subtitle {
            font-family: 'Cormorant Garamond', Georgia, serif;
            font-size: clamp(1rem, 2.2vw, 1.25rem);
            font-weight: 400;
            font-style: italic;
            color: rgba(232, 220, 200, 0.65);
            line-height: 1.7;
            max-width: 580px;
            margin: 0 auto 1rem auto;
            letter-spacing: 0.02em;
        }

        /* Easter egg words */
        .ee {
            position: relative;
            display: inline-block;
            cursor: default;
            transition: color 0.3s ease, text-shadow 0.3s ease;
            font-style: normal;
            font-weight: 600;
            color: rgba(232, 220, 200, 0.85);
        }

        /* Hover icons above words */
        .ee::before {
            position: absolute;
            top: -1.4em;
            left: 50%;
            transform: translateX(-50%) scale(0);
            font-size: 1rem;
            opacity: 0;
            transition: transform 0.3s ease, opacity 0.3s ease;
            pointer-events: none;
        }

        .ee:hover::before {
            transform: translateX(-50%) scale(1);
            opacity: 1;
        }

        .ee-eng { color: #5ec4c4; }
        .ee-eng:hover { color: #7eeaea; text-shadow: 0 0 12px rgba(94, 196, 196, 0.4); }
        .ee-eng::before { content: '\2699'; }

        .ee-res { color: #c49aff; }
        .ee-res:hover { color: #dbb8ff; text-shadow: 0 0 12px rgba(196, 154, 255, 0.4); }
        .ee-res::before { content: '\1F52C'; }

        .ee-stu { color: #f0c040; }
        .ee-stu:hover { color: #ffe066; text-shadow: 0 0 12px rgba(240, 192, 64, 0.4); }
        .ee-stu::before { content: '\1F451'; }

        /* Tagline pill */
        .tagline {
            font-family: 'Cinzel', Georgia, serif;
            font-size: clamp(0.7rem, 1.5vw, 0.85rem);
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.25em;
            color: rgba(212, 185, 106, 0.7);
            margin-bottom: 1rem;
            padding: 0.4rem 1.2rem;
            border: 1px solid rgba(212, 185, 106, 0.2);
            border-radius: 100px;
            display: inline-block;
        }

        /* Meta row */
        .meta {
            display: flex;
            justify-content: center;
            gap: 2rem;
            flex-wrap: wrap;
            font-size: 0.85rem;
            color: rgba(232, 220, 200, 0.4);
            margin-top: 1.5rem;
        }
        .meta a { color: inherit; text-decoration: none; }
        .meta a:hover { color: rgba(232, 220, 200, 0.7); }

        /* Button: magical with glow pulse */
        .enter-link {
            display: inline-block;
            margin: 1.2rem 0 1.5rem;
            padding: 0.9rem 2.8rem;
            background: linear-gradient(135deg, rgba(212, 185, 106, 0.15), rgba(180, 140, 60, 0.08));
            border: 1px solid rgba(212, 185, 106, 0.35);
            border-radius: 10px;
            color: #e0c878;
            text-decoration: none;
            font-family: 'Cinzel', Georgia, serif;
            font-weight: 700;
            font-size: 1rem;
            letter-spacing: 0.1em;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
            box-shadow: 0 0 20px rgba(212, 185, 106, 0.08), inset 0 0 20px rgba(212, 185, 106, 0.04);
            animation: btnGlow 3s ease-in-out infinite;
        }
        @keyframes btnGlow {
            0%, 100% { box-shadow: 0 0 20px rgba(212, 185, 106, 0.08), inset 0 0 20px rgba(212, 185, 106, 0.04); }
            50% { box-shadow: 0 0 35px rgba(212, 185, 106, 0.18), inset 0 0 25px rgba(212, 185, 106, 0.06); }
        }
        .enter-link::before {
            content: '';
            position: absolute;
            inset: -1px;
            border-radius: 10px;
            background: linear-gradient(135deg, rgba(212, 185, 106, 0.3), transparent 40%, transparent 60%, rgba(180, 160, 240, 0.15));
            opacity: 0;
            transition: opacity 0.4s ease;
            pointer-events: none;
        }
        .enter-link:hover::before { opacity: 1; }
        .enter-link::after {
            content: '';
            position: absolute;
            top: 0; left: -100%;
            width: 60%; height: 100%;
            background: linear-gradient(90deg, transparent 0%, rgba(255, 220, 120, 0.15) 40%, rgba(255, 220, 120, 0.25) 50%, rgba(255, 220, 120, 0.15) 60%, transparent 100%);
            animation: shimmer 4s ease-in-out infinite;
            animation-delay: 1s;
            pointer-events: none;
        }
        @keyframes shimmer {
            0% { left: -100%; }
            30% { left: 120%; }
            100% { left: 120%; }
        }
        .enter-link:hover {
            background: linear-gradient(135deg, rgba(212, 185, 106, 0.28), rgba(180, 140, 60, 0.15));
            border-color: rgba(212, 185, 106, 0.6);
            box-shadow: 0 0 50px rgba(212, 185, 106, 0.2), 0 0 80px rgba(212, 185, 106, 0.08);
            transform: translateY(-2px);
            color: #f0dfa0;
        }

        /* Staggered fade-in */
        .fade-in { opacity: 0; transform: translateY(14px); animation: fadeInUp 0.8s ease forwards; }
        .fade-d1 { animation-delay: 0.1s; }
        .fade-d2 { animation-delay: 0.4s; }
        .fade-d3 { animation-delay: 0.7s; }
        .fade-d4 { animation-delay: 1.0s; }
        .fade-d5 { animation-delay: 1.3s; }
        @keyframes fadeInUp { to { opacity: 1; transform: translateY(0); } }

        /* Stars canvas */
        #stars-canvas {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 0;
        }

        /* Floating motes container */
        .bg-motes {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 0;
        }
        .mote {
            position: absolute;
            border-radius: 50%;
            animation: moteFloat linear infinite;
        }
        @keyframes moteFloat {
            0%   { transform: translateY(0) translateX(0) scale(1); opacity: var(--mo); }
            25%  { transform: translateY(calc(var(--dy) * 0.4)) translateX(var(--dx)) scale(var(--ms)); }
            50%  { transform: translateY(var(--dy)) translateX(0) scale(1); opacity: calc(var(--mo) * 1.5); }
            75%  { transform: translateY(calc(var(--dy) * 0.6)) translateX(calc(var(--dx) * -0.7)) scale(var(--ms)); }
            100% { transform: translateY(0) translateX(0) scale(1); opacity: var(--mo); }
        }

        /* Tablet */
        @media (max-width: 900px) {
            .cover-image { max-width: 260px; }
            .cover-image-wrapper { margin-bottom: 1.2rem; }
            .title { font-size: clamp(1.5rem, 4vw, 2.2rem); }
            .subtitle { font-size: clamp(0.9rem, 2vw, 1.1rem); margin-bottom: 0.8rem; }
            .tagline { font-size: clamp(0.6rem, 1.3vw, 0.75rem); padding: 0.35rem 1rem; }
            .enter-link { padding: 0.75rem 2rem; font-size: 0.9rem; }
        }

        /* Mobile */
        @media (max-width: 600px) {
            .cover-container { padding: 0.8rem; width: 96%; }
            .cover-image { max-width: 200px; }
            .cover-image-wrapper { margin-bottom: 1rem; }
            .title { font-size: 1.4rem; line-height: 1.3; }
            .subtitle { font-size: 0.9rem; line-height: 1.5; margin-bottom: 0.6rem; }
            .tagline { font-size: 0.6rem; letter-spacing: 0.15em; padding: 0.3rem 0.8rem; margin-bottom: 0.8rem; }
            .enter-link { padding: 0.7rem 1.8rem; font-size: 0.85rem; margin: 1rem 0 1.2rem; }
            .meta { gap: 0.8rem; font-size: 0.78rem; }
            .ee::before { display: none; }
            .glow-ring { width: 120%; height: 120%; }
        }

        /* Very small screens */
        @media (max-width: 380px) {
            .cover-image { max-width: 160px; }
            .title { font-size: 1.2rem; }
            .subtitle { font-size: 0.82rem; }
            .enter-link { padding: 0.6rem 1.4rem; font-size: 0.8rem; }
        }

        @media print {
            body { background: white; }
            body::before { display: none; }
            .cover-container { max-width: 100%; }
            .bg-motes, #stars-canvas { display: none; }
            .enter-link, .enter-link::after { display: none; }
            .title { color: #2d1b4e; text-shadow: none; }
            .title .hl { -webkit-text-fill-color: #8b6914; color: #8b6914; }
            .subtitle { color: #333; }
            .tagline { color: #8b6914; border-color: #8b6914; }
            .fade-in { opacity: 1; transform: none; animation: none; }
            .glow-ring { display: none; }
        }

        @media (prefers-reduced-motion: reduce) {
            .mote, .glow-ring, .fade-in, .enter-link::after { animation: none !important; }
            .fade-in { opacity: 1; transform: none; }
            .glow-ring { opacity: 0.06; }
            #stars-canvas { display: none; }
        }
    </style>
</head>
<body class="index-page">

<canvas id="stars-canvas"></canvas>
<div class="bg-motes" id="motes"></div>

<div class="cover-container">

    <div class="cover-image-wrapper fade-in fade-d1">
        <div class="glow-ring"></div>
        <img class="cover-image" src="images/book-cover.png"
             alt="A luminous knowledge tree growing from an open book, its roots made of mathematical symbols and neural networks, its branches supporting miniature scenes of engineering, research, conversation, AI agents, analytics, and safety, with diverse people climbing at every level, all bathed in warm golden light against a deep navy sky">
    </div>

    <a href="toc.html" class="enter-link fade-in fade-d2">Enter the Journey &#10141;</a>

    <h1 class="title fade-in fade-d3">Building Conversational <span class="hl">AI</span><br>using <span class="hl">LLM</span> and <span class="hl">Agents</span></h1>

    <p class="subtitle fade-in fade-d4">
        From the mathematics of attention to production agent systems.
        A practitioner's guide for <span class="ee ee-eng">engineers</span>, <span class="ee ee-res">researchers</span>, and <span class="ee ee-stu">students</span>.
    </p>


</div>

<script>
// Floating motes (golden + purple)
(function () {
    var c = document.getElementById('motes');
    if (!c || (window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches)) return;
    var colors = [
        'rgba(212,185,106,O)', 'rgba(240,200,80,O)', 'rgba(180,150,60,O)',
        'rgba(170,130,240,O)', 'rgba(140,110,200,O)', 'rgba(190,150,240,O)'
    ];
    for (var i = 0; i < 16; i++) {
        var el = document.createElement('div');
        el.className = 'mote';
        var sz = 1.5 + Math.random() * 3, op = 0.12 + Math.random() * 0.3;
        var dur = 8 + Math.random() * 14, dy = -12 - Math.random() * 22;
        var dx = -10 + Math.random() * 20, sc = 1.1 + Math.random() * 0.5;
        var col = colors[Math.floor(Math.random() * colors.length)].replace('O', op.toFixed(2));
        el.style.cssText = 'width:'+sz+'px;height:'+sz+'px;top:'+(5+Math.random()*90)+'%;left:'+(3+Math.random()*94)+'%;background:'+col+';box-shadow:0 0 '+(sz*2.5)+'px '+col+';animation-duration:'+dur+'s;animation-delay:'+(-Math.random()*dur)+'s;--mo:'+op+';--dy:'+dy+'px;--dx:'+dx+'px;--ms:'+sc;
        c.appendChild(el);
    }
})();

// Magical twinkling stars + shooting stars + sparkle crosses + mouse parallax
(function () {
    var canvas = document.getElementById('stars-canvas');
    if (!canvas || (window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches)) return;
    var ctx = canvas.getContext('2d');
    var stars = [];
    var shooters = [];
    var STAR_COUNT = 100;
    var mx = 0.5, my = 0.5;

    function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        for (var i = 0; i < stars.length; i++) {
            stars[i].bx = Math.random() * canvas.width;
            stars[i].by = Math.random() * canvas.height;
        }
    }
    resize();
    window.addEventListener('resize', resize);

    document.addEventListener('mousemove', function (e) {
        mx = e.clientX / window.innerWidth;
        my = e.clientY / window.innerHeight;
    });

    for (var i = 0; i < STAR_COUNT; i++) {
        var depth = 0.3 + Math.random() * 0.7;
        stars.push({
            bx: Math.random() * canvas.width,
            by: Math.random() * canvas.height,
            r: 0.4 + Math.random() * 1.8,
            phase: Math.random() * Math.PI * 2,
            speed: 0.3 + Math.random() * 1.0,
            gold: Math.random() > 0.2,
            depth: depth,
            sparkle: Math.random() > 0.75 // 25% get sparkle cross
        });
    }

    // Draw a 4-point sparkle cross
    function drawSparkle(x, y, size, alpha, gold) {
        var c = gold ? '212,185,106' : '200,180,255';
        ctx.save();
        ctx.globalAlpha = alpha * 0.6;
        ctx.strokeStyle = 'rgba(' + c + ',1)';
        ctx.lineWidth = 0.8;
        // Vertical line
        ctx.beginPath();
        ctx.moveTo(x, y - size); ctx.lineTo(x, y + size);
        ctx.stroke();
        // Horizontal line
        ctx.beginPath();
        ctx.moveTo(x - size, y); ctx.lineTo(x + size, y);
        ctx.stroke();
        // Diagonal lines (shorter)
        var ds = size * 0.5;
        ctx.globalAlpha = alpha * 0.3;
        ctx.beginPath();
        ctx.moveTo(x - ds, y - ds); ctx.lineTo(x + ds, y + ds);
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(x + ds, y - ds); ctx.lineTo(x - ds, y + ds);
        ctx.stroke();
        ctx.restore();
    }

    var nextShooter = 1500 + Math.random() * 3000;
    function spawnShooter() {
        var startX = Math.random() * canvas.width * 0.8;
        var startY = Math.random() * canvas.height * 0.5;
        shooters.push({
            x: startX, y: startY,
            vx: 4 + Math.random() * 5,
            vy: 1.5 + Math.random() * 3,
            life: 1.0,
            decay: 0.012 + Math.random() * 0.008,
            len: 50 + Math.random() * 80,
            gold: Math.random() > 0.25
        });
    }

    var lastShooterTime = 0;

    function draw(t) {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        var px = (mx - 0.5) * 24;
        var py = (my - 0.5) * 16;

        for (var i = 0; i < stars.length; i++) {
            var s = stars[i];
            var twinkle = 0.5 + 0.5 * Math.sin(t * 0.001 * s.speed + s.phase);
            var alpha = 0.2 + 0.65 * twinkle;
            var sx = s.bx + px * s.depth;
            var sy = s.by + py * s.depth;

            // Main star dot
            ctx.beginPath();
            ctx.arc(sx, sy, s.r, 0, Math.PI * 2);
            ctx.fillStyle = s.gold
                ? 'rgba(212,185,106,' + alpha.toFixed(2) + ')'
                : 'rgba(200,180,255,' + (alpha * 0.7).toFixed(2) + ')';
            ctx.fill();

            // Large soft glow halo
            if (s.r > 0.9) {
                ctx.beginPath();
                ctx.arc(sx, sy, s.r * 5, 0, Math.PI * 2);
                ctx.fillStyle = s.gold
                    ? 'rgba(212,185,106,' + (alpha * 0.06).toFixed(3) + ')'
                    : 'rgba(200,180,255,' + (alpha * 0.04).toFixed(3) + ')';
                ctx.fill();
            }

            // Sparkle cross on special stars when bright
            if (s.sparkle && twinkle > 0.7) {
                var sparkleSize = s.r * 4 + twinkle * 6;
                drawSparkle(sx, sy, sparkleSize, (twinkle - 0.7) * 3.3, s.gold);
            }

            // Constellation lines between nearby bright stars
            if (s.r > 1.0 && i > 0) {
                for (var j = Math.max(0, i - 6); j < i; j++) {
                    var o = stars[j];
                    if (o.r < 1.0) continue;
                    var ox = o.bx + px * o.depth;
                    var oy = o.by + py * o.depth;
                    var dist = Math.hypot(sx - ox, sy - oy);
                    if (dist < 200) {
                        var la = 0.035 * (1 - dist / 200) * alpha;
                        ctx.beginPath();
                        ctx.moveTo(sx, sy);
                        ctx.lineTo(ox, oy);
                        ctx.strokeStyle = 'rgba(212,185,106,' + la.toFixed(3) + ')';
                        ctx.lineWidth = 0.6;
                        ctx.stroke();
                    }
                }
            }
        }

        // Shooting stars (more frequent, longer trails)
        if (t - lastShooterTime > nextShooter) {
            spawnShooter();
            lastShooterTime = t;
            nextShooter = 2500 + Math.random() * 5000;
        }
        for (var k = shooters.length - 1; k >= 0; k--) {
            var sh = shooters[k];
            sh.x += sh.vx;
            sh.y += sh.vy;
            sh.life -= sh.decay;
            if (sh.life <= 0) { shooters.splice(k, 1); continue; }

            var tailX = sh.x - sh.vx * (sh.len / 4);
            var tailY = sh.y - sh.vy * (sh.len / 4);
            var grad = ctx.createLinearGradient(tailX, tailY, sh.x, sh.y);
            var c = sh.gold ? '212,185,106' : '200,180,255';
            grad.addColorStop(0, 'rgba(' + c + ',0)');
            grad.addColorStop(0.7, 'rgba(' + c + ',' + (sh.life * 0.4).toFixed(2) + ')');
            grad.addColorStop(1, 'rgba(' + c + ',' + (sh.life * 0.9).toFixed(2) + ')');
            ctx.beginPath();
            ctx.moveTo(tailX, tailY);
            ctx.lineTo(sh.x, sh.y);
            ctx.strokeStyle = grad;
            ctx.lineWidth = 2;
            ctx.stroke();

            // Bright glowing head
            ctx.beginPath();
            ctx.arc(sh.x, sh.y, 2, 0, Math.PI * 2);
            ctx.fillStyle = 'rgba(' + c + ',' + sh.life.toFixed(2) + ')';
            ctx.fill();
            // Head glow
            ctx.beginPath();
            ctx.arc(sh.x, sh.y, 6, 0, Math.PI * 2);
            ctx.fillStyle = 'rgba(' + c + ',' + (sh.life * 0.15).toFixed(2) + ')';
            ctx.fill();
        }

        requestAnimationFrame(draw);
    }
    requestAnimationFrame(draw);
})();

// Easter egg: particle burst on hover
(function () {
    if (window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches) return;
    var icons = { 'ee-eng': ['\u2699','\u{1F527}','\u{1F4BB}','</\u200B>'], 'ee-res': ['\u{1F52C}','\u2728','\u{1F4CA}','\u{1F9EA}'], 'ee-stu': ['\u{1F451}','\u2B50','\u{1F4DA}','\u{1F393}'] };
    var cooldowns = {};

    document.querySelectorAll('.ee').forEach(function (el) {
        el.addEventListener('mouseenter', function () {
            var key = el.className;
            if (cooldowns[key] && Date.now() - cooldowns[key] < 1800) return;
            cooldowns[key] = Date.now();

            var type = key.includes('ee-eng') ? 'ee-eng' : key.includes('ee-res') ? 'ee-res' : 'ee-stu';
            var set = icons[type] || [];
            var rect = el.getBoundingClientRect();
            var cx = rect.left + rect.width / 2;
            var cy = rect.top;

            for (var i = 0; i < 5; i++) {
                var p = document.createElement('span');
                p.textContent = set[Math.floor(Math.random() * set.length)];
                p.style.cssText = 'position:fixed;left:'+cx+'px;top:'+cy+'px;font-size:'+(10+Math.random()*8)+'px;pointer-events:none;z-index:9999;opacity:1;transition:all '+(0.6+Math.random()*0.5)+'s ease-out;';
                document.body.appendChild(p);
                var dx = -30 + Math.random() * 60;
                var dy = -30 - Math.random() * 40;
                requestAnimationFrame(function (pp, ddx, ddy) {
                    return function () {
                        pp.style.transform = 'translate('+ddx+'px, '+ddy+'px) scale(0.3)';
                        pp.style.opacity = '0';
                    };
                }(p, dx, dy));
                setTimeout(function (pp) { return function () { pp.remove(); }; }(p), 1200);
            }
        });
    });
})();
</script>
