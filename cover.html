<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Building Conversational AI using LLM and Agents</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&family=Playfair+Display:wght@700;800&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(160deg, #0a1628 0%, #1a1a3e 30%, #2d1b4e 60%, #1a1a3e 100%);
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            color: #f0e6d3;
            overflow: hidden;
        }

        .cover-container {
            max-width: 800px;
            width: 90%;
            text-align: center;
            padding: 2rem;
            position: relative;
        }

        .cover-image-wrapper {
            position: relative;
            margin-bottom: 2.5rem;
        }

        .cover-image {
            width: 100%;
            max-width: 520px;
            border-radius: 16px;
            box-shadow:
                0 0 60px rgba(255, 183, 77, 0.15),
                0 20px 60px rgba(0, 0, 0, 0.5),
                0 0 120px rgba(255, 183, 77, 0.05);
        }

        .glow-ring {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 110%;
            height: 110%;
            border-radius: 24px;
            background: radial-gradient(ellipse, rgba(255, 183, 77, 0.08) 0%, transparent 70%);
            pointer-events: none;
        }

        .title {
            font-family: 'Playfair Display', Georgia, serif;
            font-weight: 800;
            font-size: clamp(2rem, 5vw, 3.2rem);
            line-height: 1.15;
            margin-bottom: 0.8rem;
            background: linear-gradient(135deg, #f5e6c8 0%, #ffd699 40%, #f5e6c8 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: -0.02em;
        }

        .subtitle {
            font-size: clamp(0.95rem, 2vw, 1.15rem);
            font-weight: 300;
            color: rgba(240, 230, 211, 0.7);
            line-height: 1.6;
            max-width: 600px;
            margin: 0 auto 2rem auto;
            letter-spacing: 0.01em;
        }

        .tagline {
            font-size: clamp(0.85rem, 1.8vw, 1.05rem);
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.2em;
            color: rgba(255, 183, 77, 0.85);
            margin-bottom: 2rem;
            padding: 0.6rem 1.5rem;
            border: 1px solid rgba(255, 183, 77, 0.25);
            border-radius: 100px;
            display: inline-block;
        }

        .meta {
            display: flex;
            justify-content: center;
            gap: 2rem;
            flex-wrap: wrap;
            font-size: 0.85rem;
            color: rgba(240, 230, 211, 0.5);
            margin-top: 1.5rem;
        }

        .meta span {
            display: flex;
            align-items: center;
            gap: 0.4rem;
        }

        .meta-icon {
            font-size: 1rem;
        }

        .enter-link {
            display: inline-block;
            margin-top: 2.5rem;
            padding: 0.9rem 2.5rem;
            background: linear-gradient(135deg, rgba(255, 183, 77, 0.15), rgba(255, 183, 77, 0.08));
            border: 1px solid rgba(255, 183, 77, 0.3);
            border-radius: 12px;
            color: #ffd699;
            text-decoration: none;
            font-weight: 600;
            font-size: 1rem;
            letter-spacing: 0.05em;
            transition: all 0.3s ease;
        }

        .enter-link:hover {
            background: linear-gradient(135deg, rgba(255, 183, 77, 0.25), rgba(255, 183, 77, 0.15));
            border-color: rgba(255, 183, 77, 0.5);
            box-shadow: 0 0 30px rgba(255, 183, 77, 0.1);
            transform: translateY(-2px);
        }

        .bg-particles {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            pointer-events: none;
            z-index: -1;
        }

        .particle {
            position: absolute;
            width: 2px;
            height: 2px;
            background: rgba(255, 183, 77, 0.3);
            border-radius: 50%;
            animation: float 8s ease-in-out infinite;
        }

        .particle:nth-child(1) { top: 10%; left: 20%; animation-delay: 0s; }
        .particle:nth-child(2) { top: 30%; left: 80%; animation-delay: 1.5s; animation-duration: 10s; }
        .particle:nth-child(3) { top: 60%; left: 15%; animation-delay: 3s; animation-duration: 7s; }
        .particle:nth-child(4) { top: 80%; left: 70%; animation-delay: 2s; animation-duration: 9s; }
        .particle:nth-child(5) { top: 45%; left: 50%; animation-delay: 4s; animation-duration: 11s; }
        .particle:nth-child(6) { top: 15%; left: 60%; animation-delay: 1s; animation-duration: 6s; }
        .particle:nth-child(7) { top: 70%; left: 35%; animation-delay: 5s; animation-duration: 8s; }
        .particle:nth-child(8) { top: 25%; left: 45%; animation-delay: 2.5s; animation-duration: 12s; }

        @keyframes float {
            0%, 100% { transform: translateY(0) scale(1); opacity: 0.3; }
            50% { transform: translateY(-20px) scale(1.5); opacity: 0.6; }
        }

        @media (max-width: 600px) {
            .cover-container { padding: 1rem; }
            .meta { gap: 1rem; }
        }

        @media print {
            body { background: white; }
            .cover-container { max-width: 100%; }
            .bg-particles { display: none; }
            .enter-link { display: none; }
            .title { -webkit-text-fill-color: #2d1b4e; color: #2d1b4e; }
            .subtitle { color: #333; }
            .tagline { color: #8b6914; border-color: #8b6914; }
        }
    </style>
    <link rel="stylesheet" href="vendor/katex/katex.min.css">
    <script defer src="vendor/katex/katex.min.js"></script>
    <script defer src="vendor/katex/contrib/auto-render.min.js"
        onload="renderMathInElement(document.body, {
            delimiters: [
                {left: '$$', right: '$$', display: true},
                {left: '$', right: '$', display: false}
            ],
            throwOnError: false
        });"></script>
    <link rel="stylesheet" href="./vendor/prism/prism-theme.css">
    <script defer src="./vendor/prism/prism-bundle.min.js"></script>
</head>
<body>

    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
</div>

<div class="cover-container">

    <div class="cover-image-wrapper">
        <div class="glow-ring"></div>
        <img class="cover-image" src="images/book-cover.png"
             alt="A luminous knowledge tree growing from an open book, its roots made of mathematical symbols and neural networks, its branches supporting miniature scenes of engineering, research, conversation, AI agents, analytics, and safety, with diverse people climbing at every level, all bathed in warm golden light against a deep navy sky">
    </div>

    <h1 class="title">Building Conversational AI<br>using LLM and Agents</h1>

    <p class="subtitle">
        From the mathematics of attention to production agent systems. A practitioner’s guide for engineers, researchers, and students.
    </p>

    <div class="tagline">One book, every path through the LLM landscape</div>

    <div class="meta">
        <span><span class="meta-icon">&#128218;</span> 31 Chapters</span>
        <span><span class="meta-icon">&#128214;</span> 7 Parts</span>
        <span><span class="meta-icon">&#128209;</span> 10 Appendices</span>

    </div>

</div>

</body>
</html>
